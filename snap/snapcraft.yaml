name: remixed-pixel-dungeon
version: '32.3.beta.6'
icon: snap/gui/remixed-pixel-dungeon.png
title: Remixed Dungeon
summary: Classic roguelike dungeon crawler with pixel graphics
description: |
  Remixed Dungeon is a classic roguelike dungeon crawler game with pixel graphics.
  It's a fork of the famous Pixel Dungeon featuring English, Russian and many more localizations.
  This is the desktop version of the game.

base: core22
grade: stable
license: GPL-3.0
contact: https://discord.gg/AMXrhQZ
issues: https://github.com/NYRDS/remixed-dungeon/issues
source-code: https://github.com/NYRDS/remixed-dungeon
website: https://wiki.nyrds.net/
confinement: strict

architectures:
  - build-on: amd64

# New: Layouts to bind ALSA configs and plugins to expected paths
layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/alsa-lib:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/alsa-lib
  /usr/share/alsa:
    bind: $SNAP/usr/share/alsa
  /etc/java-17-openjdk:
    bind: $SNAP/etc/java-17-openjdk
  /usr/lib/x86_64-linux-gnu/dri:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/dri

parts:
  # New: ALSA mixin part for audio routing and config handling
  alsa-mixin:
    plugin: dump
    source: https://github.com/diddlesnaps/snapcraft-alsa.git
    source-subdir: snapcraft-assets
    build-packages:
      - libasound2-dev
    stage-packages:
      - libasound2
      - libasound2-plugins
      - yad
    stage:
      - etc/asound.conf
      - snap/command-chain/alsa-launch
      - usr/bin/yad*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/alsa-lib
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libasound*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libdnsfile*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libFLAC*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libjack*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libpulse*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libsamplerate*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libspeex*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libvorbis*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libsndfile*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libasyncns*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/pulseaudio

  remixed-dungeon:
    after: [alsa-mixin]  # New: Ensure this part runs after alsa-mixin
    plugin: dump
    source: .
    override-build: |
      set -e
      
      # Create snap directory structure (this ensures directories exist before copying)
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      mkdir -p $SNAPCRAFT_PART_INSTALL/data
      
      # Build the application using the project's gradlew
      # Java is provided by the build-packages
      # Patch build.gradle to mark this as a snap build (idempotent)
      sed -i 's/FLAVOR_market = "vkplay"/FLAVOR_market = "snap"/' RemixedDungeonDesktop/build.gradle
      grep -q 'FLAVOR_market = "snap"' RemixedDungeonDesktop/build.gradle || { echo "ERROR: FLAVOR_market not set to snap in build.gradle"; exit 1; }
      ./gradlew -c settings.desktop.gradle :RemixedDungeonDesktop:shadowJar --no-daemon
      
      # Copy the built JAR file - find the correct one based on actual build output
      cp RemixedDungeonDesktop/build/libs/RemixedDungeon.jar $SNAPCRAFT_PART_INSTALL/bin/remixed-dungeon.jar
      
      # Copy assets and other necessary files
      mkdir -p $SNAPCRAFT_PART_INSTALL/data/mods/Remixed
      # Copy desktop assets, skipping the dangling scripts symlink
      tar cf - --exclude='scripts' -C RemixedDungeonDesktop/src/desktop/assets . | tar xf - -C $SNAPCRAFT_PART_INSTALL/data/mods/Remixed
      cp -r RemixedDungeonDesktop/src/desktop/d_assets/* $SNAPCRAFT_PART_INSTALL/data/mods/Remixed/
      cp -r RemixedDungeonDesktop/src/desktop/l10ns/* $SNAPCRAFT_PART_INSTALL/data/mods/Remixed/

      # Copy Lua scripts (game looks for scripts/ in the asset search paths)
      cp -r scripts $SNAPCRAFT_PART_INSTALL/data/mods/Remixed/
      
      # Copy the wrapper script
      cp snap/local/wrapper.sh $SNAPCRAFT_PART_INSTALL/bin/remixed-dungeon-wrapper.sh
      chmod +x $SNAPCRAFT_PART_INSTALL/bin/remixed-dungeon-wrapper.sh
    build-packages:
      - openjdk-17-jdk-headless
      - python3
      - python3-pip
      - python3-lxml
      - wget
      - unzip
      - curl
    stage-packages:
      - openjdk-17-jre-headless
      - libasound2
      - libgtk-3-0
      - libgl1
      - libgl1-mesa-dri
      - libglu1-mesa
      - libopenal1
      - libflac8
      - libvorbisfile3
      - libudev1
      - libfreetype6
      - libfontconfig1
      - libsndfile1
      - x11-xserver-utils
    prime:
      - bin/
      - data/
      - etc/java-17-openjdk/
      - usr/

apps:
  remixed-pixel-dungeon:
    command-chain: ["snap/command-chain/alsa-launch"]  # New: Use ALSA launch chain for audio init
    command: bin/remixed-dungeon-wrapper.sh
    plugs:
      - desktop
      - wayland
      - x11
      - opengl
      - audio-playback
      - network
      - home
      - removable-media
    environment:
      DISPLAY: $DISPLAY
      WAYLAND_DISPLAY: $WAYLAND_DISPLAY
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib/x86_64-linux-gnu/dri:$SNAP/usr/lib/jni
